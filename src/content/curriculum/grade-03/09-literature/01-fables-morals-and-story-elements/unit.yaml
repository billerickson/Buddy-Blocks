title: Fables, Morals, And Story Elements
description: "Establish the core habits of Level 1 literary study: retelling a short story in order, naming story elements, and connecting a moral or lesson to specific events. Fables are compact enough for students to practice comprehension, evidence, and feedback without heavy reading load."
