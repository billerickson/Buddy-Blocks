slug: folktales-tricksters-and-story-patterns
title: Folktales, Tricksters, And Story Patterns
description: Extend fable comprehension into longer oral-tradition patterns. Students recognize repeated scenes, trickster behavior, tests, warnings, and patterned endings while learning that folktales can travel, change, and carry cultural memory.
