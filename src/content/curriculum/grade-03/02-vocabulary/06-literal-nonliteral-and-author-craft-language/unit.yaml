id: unit_grade3_vocabulary_u06_literal_nonliteral_and_author_craft_language
slug: literal-nonliteral-and-author-craft-language
title: Literal, Nonliteral, And Author-Craft Language
description: Introduce common nonliteral language and simple author-craft vocabulary in short, concrete contexts. Students learn that some phrases must be interpreted as whole expressions and that writers choose words to create pictures, sounds, comparisons, and dialogue.
