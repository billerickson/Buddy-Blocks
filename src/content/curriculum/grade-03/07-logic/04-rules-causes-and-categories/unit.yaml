id: unit_grade3_logic_u04_rules_causes_and_categories
slug: rules-causes-and-categories
title: Rules, Causes, And Categories
description: "Introduce common reasoning forms that students meet across subjects: if-then rules, cause/effect claims, categories, and all/some/none statements. Students learn to follow the information given without reversing rules, confusing sequence with cause, or overreading broad words."
