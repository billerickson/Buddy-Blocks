id: unit_grade3_grammar_u05_prepositions_conjunctions_and_sentence_expansion
slug: prepositions-conjunctions-and-sentence-expansion
title: Prepositions, Conjunctions, And Sentence Expansion
description: Teach students how word groups add location, time, and connection. Prepositions create phrases that add information, while conjunctions connect related words or ideas. Students use this knowledge to expand and combine sentences without creating fragments or run-ons.
