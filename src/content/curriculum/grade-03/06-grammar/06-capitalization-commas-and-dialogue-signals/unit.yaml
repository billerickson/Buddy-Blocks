id: unit_grade3_grammar_u06_capitalization_commas_and_dialogue_signals
slug: capitalization-commas-and-dialogue-signals
title: Capitalization, Commas, And Dialogue Signals
description: Give focused attention to high-utility mechanics once students can recognize sentence structures. Students learn capitalization rules, commas in specific simple structures, and introductory dialogue punctuation as signals that help readers understand names, groups, time, place, and speakers.
