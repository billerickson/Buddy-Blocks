id: unit_grade3_grammar_u01_sentences_subjects_and_predicates
slug: sentences-subjects-and-predicates
title: Sentences, Subjects, And Predicates
description: "Build the foundation for all later grammar work: a sentence expresses a complete thought, usually with a subject and predicate, and punctuation marks the sentence's purpose. Students learn to recognize complete sentences before they are asked to edit fragments, run-ons, or more detailed word jobs."
