id: unit_grade3_grammar_u04_adjectives_adverbs_and_precise_description
slug: adjectives-adverbs-and-precise-description
title: Adjectives, Adverbs, And Precise Description
description: Show how modifiers make sentences more precise. Students identify adjectives and adverbs by what they modify, choose comparative and superlative forms, and revise short sentences by adding or changing details without overloading the sentence.
