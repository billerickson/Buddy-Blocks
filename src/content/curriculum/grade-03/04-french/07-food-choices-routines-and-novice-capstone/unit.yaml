title: Food, Choices, Routines, And Novice Capstone
description: Bring French 1 language together in familiar choice, food, place, and routine contexts. Students use vouloir and polite ordering chunks, describe simple daily routines with faire/aller/aimer, notice francophone cultural contexts, and complete mixed novice communication tasks.
