id: unit_grade3_math_u01_grade_3_number_readiness
slug: grade-3-number-readiness
title: Grade 3 Number Readiness
description: Stabilize the Grade 2 arithmetic and representation knowledge students need before the new cognitive load of Grade 3 multiplication, division, fractions, and multi-step problem solving. Students review place value, addition and subtraction strategies, number lines, skip counting, equal groups, arrays, and simple problem models.
