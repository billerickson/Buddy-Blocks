slug: measurement-data-and-applied-quantitative-reasoning
title: Measurement, Data, And Applied Quantitative Reasoning
description: Use measurement and data as applied contexts for arithmetic, fractions, units, scales, and decision-making. Students solve problems involving time, length, mass, liquid volume, line plots, scaled graphs, and simple financial choices.
