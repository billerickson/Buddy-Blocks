id: unit_grade3_spanish_u05_likes_activities_and_school_life
slug: likes-activities-and-school-life
title: Likes, Activities, And School Life
description: Extend personal communication into preferences, activities, school subjects, schedules, and common present-tense school actions. Students use `me gusta/me gustan`, `no me gusta`, `quiero`, and selected regular verb chunks to talk about familiar school and free-time life.
