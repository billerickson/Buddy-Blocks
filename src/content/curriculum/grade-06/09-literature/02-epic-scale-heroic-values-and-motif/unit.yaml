id: unit_grade6_literature_u02_epic_scale_heroic_values_and_motif
slug: epic-scale-heroic-values-and-motif
title: Epic Scale, Heroic Values, And Motif
description: Introduce epic and heroic narrative as forms that use scale, memory, repetition, public values, and journey or conflict patterns to explore human action. Students learn to read epic scenes for motif, value conflict, and the costs of heroic choices.
