id: unit_grade6_literature_u05_dialogue_wisdom_lyric_and_public_ideas
slug: dialogue-wisdom-lyric-and-public-ideas
title: Dialogue, Wisdom, Lyric, And Public Ideas
description: Help students read shorter idea-bearing forms that are not primarily plot-driven. Students learn to track question and answer, speaker and addressee, aphorism and image, historical example and public value, and the difference between reasoning from a text and turning it into an opinion prompt.
