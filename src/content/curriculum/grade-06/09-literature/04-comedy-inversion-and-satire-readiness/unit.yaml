id: unit_grade6_literature_u04_comedy_inversion_and_satire_readiness
slug: comedy-inversion-and-satire-readiness
title: Comedy, Inversion, And Satire Readiness
description: Introduce age-appropriate comedy and satire readiness through exaggeration, inversion, mistaken expectation, social criticism, and audience effect. Students learn that comic form can expose folly or disorder while still requiring careful textual evidence.
