slug: connotation-denotation-and-precise-word-choice
title: Connotation, Denotation, And Precise Word Choice
description: Teach students that words with similar dictionary meanings can differ in feeling, intensity, formality, precision, and point of view. Students apply these distinctions to reading and revision.
