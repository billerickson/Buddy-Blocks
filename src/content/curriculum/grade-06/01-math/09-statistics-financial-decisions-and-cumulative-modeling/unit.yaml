title: Statistics, Financial Decisions, And Cumulative Modeling
description: Develop data reasoning and end-of-level transfer. Students distinguish statistical questions, analyze distributions with center and variability, make simple financial decisions using rates, decimals, percents, and data, and complete cumulative modeling tasks.
