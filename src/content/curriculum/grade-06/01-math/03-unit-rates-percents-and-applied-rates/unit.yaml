title: Unit Rates, Percents, And Applied Rates
description: Extend ratio reasoning to rates, unit rates, and percent as rate per 100. Students interpret units carefully, use tables and double number lines, and solve concrete applied problems without crossing into later Grade 7 proportional relationship procedures.
