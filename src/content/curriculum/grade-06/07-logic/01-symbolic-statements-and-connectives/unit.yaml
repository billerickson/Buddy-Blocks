id: unit_grade6_logic_u01_symbolic_statements_and_connectives
slug: symbolic-statements-and-connectives
title: Symbolic Statements And Connectives
description: "Introduce students to propositions, statement variables, and the basic connectives that let ordinary claims be represented symbolically. The unit emphasizes meaning before manipulation: students translate familiar sentences, read symbols back into words, and avoid common errors with `not`, `and`, and inclusive `or`."
