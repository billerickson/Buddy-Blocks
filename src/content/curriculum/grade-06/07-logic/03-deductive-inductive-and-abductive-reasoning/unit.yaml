id: unit_grade6_logic_u03_deductive_inductive_and_abductive_reasoning
slug: deductive-inductive-and-abductive-reasoning
title: Deductive, Inductive, And Abductive Reasoning
description: "Broaden students' understanding of support. Students learn that good reasoning does not always have the same kind of force: deduction can guarantee, induction can make a conclusion likely, and abduction can choose the best explanation while remaining revisable."
