title: Liberty, Democracy, Economy, And Critique
description: Study modern civic, political, economic, and critical prose through questions of rights, consent, constitutional order, equality, democracy, commerce, labor, revolution, and civil society. Students learn to read arguments by tracking definitions, assumptions, audience, evidence, objections, and consequences.
