title: Renaissance Self, State, Satire, And Stage
description: Explore Renaissance and early modern texts that complicate inherited moral and civic categories through statecraft, custom, skepticism, satire, essayistic self-examination, and drama. Students learn to read prudential argument, irony, grotesque exaggeration, soliloquy, character conflict, and tragic consequence.
