slug: seminar-tools-for-difficult-classics
title: Seminar Tools For Difficult Classics
description: Establish the habits and vocabulary students need before entering a dense primary-text corpus. Students learn to orient a passage, distinguish summary from interpretation and evaluation, track speaker and genre, and use evidence in a compact seminar-style response.
