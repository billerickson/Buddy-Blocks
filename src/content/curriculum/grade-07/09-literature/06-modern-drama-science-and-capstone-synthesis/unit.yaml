title: Modern Drama, Science, And Capstone Synthesis
description: Bring the level to synthesis through modern drama, scientific-humanistic reflection, and cross-era comparison. Students examine social pressure, selfhood, responsibility, scientific models of life, and the limits of disciplinary explanation before completing compact capstone transfer tasks.
