slug: ancient-questions-of-justice-virtue-and-the-city
title: Ancient Questions Of Justice, Virtue, And The City
description: Introduce ancient forms and problems through selected dialogue, comedy, ethical and political prose, biography, and Stoic meditation. Students practice reading arguments and dramatic voices while tracing questions about justice, education, law, virtue, friendship, citizenship, and the examined life.
