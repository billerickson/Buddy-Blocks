slug: scripture-confession-and-the-inner-life
title: Scripture, Confession, And The Inner Life
description: Read selected biblical and Augustinian texts as literary, theological, historical, and philosophical works that reshape classical questions of self, city, time, memory, love, conversion, and community. The unit emphasizes respectful textual understanding and genre-sensitive interpretation.
