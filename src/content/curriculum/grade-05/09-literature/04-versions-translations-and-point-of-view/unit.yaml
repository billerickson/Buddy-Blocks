id: unit_grade5_literature_u04_versions_translations_and_point_of_view
slug: versions-translations-and-point-of-view
title: Versions, Translations, And Point Of View
description: Teach students that adaptations and translations involve choices. Students compare short paired passages to notice how wording, omitted details, emphasis, tone, and point of view can shift interpretation while preserving a shared story base.
