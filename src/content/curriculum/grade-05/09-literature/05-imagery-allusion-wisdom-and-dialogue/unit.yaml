title: Imagery, Allusion, Wisdom, And Dialogue
description: Deepen close reading by focusing on how compact forms and language choices create meaning. Students study imagery, metaphor, symbol readiness, allusion, repetition, lyric speaker, wisdom sayings, speeches, and dialogues in short, rereadable passages.
