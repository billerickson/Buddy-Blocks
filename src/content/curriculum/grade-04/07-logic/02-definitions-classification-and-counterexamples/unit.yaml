id: unit_grade4_logic_u02_definitions_classification_and_counterexamples
slug: definitions-classification-and-counterexamples
title: Definitions, Classification, And Counterexamples
description: Teach students to test the boundaries of terms, rules, and categories. Students learn that definitions can be clear, too broad, too narrow, or unclear, and that examples, nonexamples, and counterexamples can reveal the problem.
