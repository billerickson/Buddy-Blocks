id: unit_grade4_literature_u04_quests_tests_and_heroic_choices
slug: quests-tests-and-heroic-choices
title: Quests, Tests, And Heroic Choices
description: Develop students' ability to read heroic and journey episodes as structured stories with tasks, helpers, obstacles, choices, costs, and returns. The unit resists simple hero-good and monster-bad labels by asking students to notice pride, courage, cleverness, loyalty, restraint, and consequences.
