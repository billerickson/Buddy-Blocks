slug: myth-cycles-names-places-and-patterns
title: Myth Cycles, Names, Places, And Patterns
description: Introduce adapted Greek and Roman myth cycles through story-centered background knowledge. Students learn names, places, relationships, and objects only as they help explain the story. The unit emphasizes transformation, promise, forbidden choice, hospitality, fate, reward, consequence, and the idea that traditional myths often have multiple versions.
