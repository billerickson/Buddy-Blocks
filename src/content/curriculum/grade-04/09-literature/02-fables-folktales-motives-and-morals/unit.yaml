slug: fables-folktales-motives-and-morals
title: Fables, Folktales, Motives, And Morals
description: Use longer fables and folktales to deepen character, motive, consequence, trickster pattern, and moral reasoning. Students learn that a moral should fit the events, not simply repeat a familiar saying, and that cleverness can be admirable, risky, or harmful depending on the story.
