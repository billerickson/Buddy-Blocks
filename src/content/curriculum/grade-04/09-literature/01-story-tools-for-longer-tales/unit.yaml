id: unit_grade4_literature_u01_story_tools_for_longer_tales
slug: story-tools-for-longer-tales
title: Story Tools For Longer Tales
description: Stabilize the story-reading habits students need before longer classical and traditional texts. Students refresh genre labels, retelling, event sequence, character, setting, problem, outcome, moral, theme, and short evidence. The unit extends beginning-middle-end retelling into linked episodes, cause and effect, turning points, and meaningful omissions.
